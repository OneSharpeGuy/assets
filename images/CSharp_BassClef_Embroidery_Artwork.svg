<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="2400" height="1800" viewBox="0 0 2400 1800" xmlns="http://www.w3.org/2000/svg">
  <title>C Sharp Bass Clef Embroidery Artwork</title>
  <desc>Embroidery-friendly flat vector artwork: simplified bass clef character leaning on C with sharp symbol close behind elbow and shoe.</desc>

  <defs>
    <style>
      .outline { stroke:#111111; stroke-width:28; stroke-linejoin:round; stroke-linecap:round; }
      .thin { stroke:#111111; stroke-width:14; stroke-linejoin:round; stroke-linecap:round; }
      .detail { stroke:#111111; stroke-width:9; stroke-linejoin:round; stroke-linecap:round; }
      .no-fill { fill:none; }
    </style>
  </defs>

  <!-- Transparent background -->

  <!-- Large C, brought forward / left -->
  <text x="120" y="1385"
        font-family="Georgia, Times New Roman, serif"
        font-size="1180"
        font-weight="bold"
        fill="#4A3B28"
        stroke="#111111"
        stroke-width="32">C</text>
  <text x="155" y="1360"
        font-family="Georgia, Times New Roman, serif"
        font-size="1120"
        font-weight="bold"
        fill="none"
        stroke="#C9B183"
        stroke-width="16">C</text>

  <!-- Sharp symbol, tucked close behind elbow and shoe -->
  <g transform="translate(1430 590) scale(1.05)">
    <path class="outline" fill="#4A3B28" d="M180 0 h115 v270 h115 V0 h115 v270 h145 v110 H525 v255 h145 v110 H525 v270 H410 V745 H295 v270 H180 V745 H35 V635 h145 V380 H35 V270 h145z"/>
    <path class="thin no-fill" stroke="#C9B183" d="M230 30 v960 M465 30 v960 M65 325 h575 M65 690 h575"/>
  </g>

  <!-- Character body behind the C but visible -->
  <g transform="translate(825 355)">
    <!-- legs -->
    <path class="outline" fill="#111111" d="M275 650 c-25 180 -18 360 -8 505 h115 c2-190 5-350 38-505z"/>
    <path class="outline" fill="#111111" d="M450 650 c45 170 100 330 160 500 h115 c-55-205-105-375-130-500z"/>

    <!-- crossed lower leg / shoe -->
    <path class="outline" fill="#111111" d="M390 1090 c95 60 175 95 280 112 c45 8 65 85 10 112 c-130 18-245-30-350-108z"/>
    <path class="outline" fill="#FFFFFF" d="M610 1190 c48 10 92 14 128 10 c50 40 30 95-30 105 c-60-5-105-20-145-45z"/>
    <path class="outline" fill="#FFFFFF" d="M230 1170 h135 c35 25 40 83 0 110 h-135 c-55-10-58-88 0-110z"/>

    <!-- torso / shirt -->
    <path class="outline" fill="#FFFFFF" d="M185 330 c90-70 310-70 405 0 c60 135 50 260 8 385 c-120 55-300 55-420 0 c-45-125-55-250 7-385z"/>

    <!-- vest -->
    <path class="outline" fill="#111111" d="M225 330 h110 l40 380 h-150 c-45-110-55-245 0-380z"/>
    <path class="outline" fill="#111111" d="M445 330 h110 c55 135 45 270 0 380 h-150z"/>
    <path fill="#D71920" d="M255 360 h45 l35 320 h-55z"/>
    <path fill="#D71920" d="M455 360 h45 l-25 320 h-55z"/>
    <path fill="#D71920" d="M345 360 h55 l5 320 h-55z"/>

    <!-- lapels and bow tie -->
    <path class="thin" fill="#222222" d="M330 330 l65 120 l-55 55 l-70-145z"/>
    <path class="thin" fill="#222222" d="M445 330 l-65 120 l55 55 l70-145z"/>
    <path class="thin" fill="#111111" d="M325 310 c50-55 95-5 95 30 c0 35-45 85-95 30z"/>
    <path class="thin" fill="#111111" d="M460 310 c-50-55-95-5-95 30 c0 35 45 85 95 30z"/>
    <circle cx="390" cy="342" r="20" fill="#111111"/>

    <!-- buttons -->
    <circle cx="390" cy="470" r="14" fill="#E6C15A" stroke="#111111" stroke-width="7"/>
    <circle cx="390" cy="540" r="14" fill="#E6C15A" stroke="#111111" stroke-width="7"/>
    <circle cx="390" cy="610" r="14" fill="#E6C15A" stroke="#111111" stroke-width="7"/>

    <!-- left arm leaning over C -->
    <path class="outline" fill="#FFFFFF" d="M185 360 c-120 35-185 105-220 210 c35 30 75 45 120 40 c35-75 75-120 140-145z"/>
    <path class="outline" fill="#F4A261" d="M15 535 c70-10 135 20 145 78 c-25 60-130 55-175 10 c-20-25-18-65 30-88z"/>

    <!-- right arm over sharp -->
    <path class="outline" fill="#FFFFFF" d="M560 365 c150 35 250 80 360 145 c-5 48-30 80-72 95 c-105-55-190-95-285-110z"/>
    <path class="outline" fill="#F4A261" d="M835 520 c80 0 135 38 125 95 c-55 45-150 45-190-5 c-20-45 10-85 65-90z"/>

    <!-- neck -->
    <path class="outline" fill="#B87333" d="M355 270 h70 v75 h-70z"/>

    <!-- bass clef head, zero-degree/upright -->
    <g transform="translate(328 -110)">
      <path class="outline" fill="#0B8F2A" d="M150 30 c-110 0-185 80-185 175 c0 85 58 140 130 140 c65 0 105-42 105-92 c0-45-35-80-78-80 c-38 0-65 25-72 58 c-10-70 35-130 115-130 c95 0 145 75 120 170 c-20 80-80 150-145 230 c-32 40-55 75-70 112 c-12 35 12 60 45 42 c112-70 230-205 258-355 c27-148-50-270-223-270z"/>
      <circle class="outline" fill="#0B8F2A" cx="360" cy="188" r="45"/>
      <circle class="outline" fill="#0B8F2A" cx="360" cy="310" r="45"/>
      <path fill="none" stroke="#A7F3A4" stroke-width="18" stroke-linecap="round" d="M105 92 c90-40 175 15 155 125 c-18 100-95 180-160 255"/>
    </g>

    <!-- boater hat -->
    <g transform="translate(340 -130)">
      <ellipse class="outline" fill="#DFA629" cx="140" cy="95" rx="205" ry="58"/>
      <path class="outline" fill="#DFA629" d="M20 20 h240 c25 0 45 22 45 50 v40 H-25 V70 c0-28 20-50 45-50z"/>
      <rect x="0" y="65" width="285" height="45" fill="#111111"/>
      <rect x="0" y="65" width="285" height="18" fill="#D71920"/>
    </g>

    <!-- hand in pocket detail -->
    <path class="detail" fill="none" stroke="#F4A261" d="M525 680 c35-8 58 8 70 35"/>
  </g>

  <!-- Simplification note embedded as non-rendering metadata:
       Intended for embroidery digitizing: flat fills, heavy outlines, no gradients, no tiny facial details.
       Recommended thread colors: black, white, red, green, gold, tan/skin, bronze/gunmetal.
  -->
</svg>
